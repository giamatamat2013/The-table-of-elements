<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>טבלת היסודות המחזורית</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: #1a1a2e;
    color: #fff;
    min-height: 100vh;
    overflow-x: auto;
    direction: ltr;
  }
  h1 {
    text-align: center;
    padding: 18px 10px 4px;
    font-size: clamp(18px, 3vw, 30px);
    color: #e0e0ff;
    letter-spacing: 1px;
  }
  .subtitle {
    text-align: center;
    color: #8888bb;
    font-size: clamp(11px, 1.5vw, 15px);
    margin-bottom: 10px;
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    padding: 6px 10px 10px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: #ccc;
  }
  .legend-color {
    width: 14px; height: 14px;
    border-radius: 3px;
  }
  .table-wrapper {
    overflow-x: auto;
    padding: 0 8px 20px;
  }
  .periodic-table {
    display: grid;
    grid-template-columns: repeat(18, minmax(52px, 1fr));
    gap: 2px;
    min-width: 950px;
    max-width: 1300px;
    margin: 0 auto;
  }
  .element {
    position: relative;
    aspect-ratio: 1;
    min-width: 48px;
    min-height: 48px;
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, box-shadow 0.15s, z-index 0s;
    border: 1px solid rgba(255,255,255,0.08);
    z-index: 1;
  }
  .element:hover {
    transform: scale(1.5);
    box-shadow: 0 0 24px rgba(255,255,255,0.3);
    z-index: 100;
    border-color: #fff;
  }
  .element .number {
    font-size: 8px;
    opacity: 0.75;
    position: absolute;
    top: 3px;
    left: 3px;
  }
  .element .symbol {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.1;
  }
  .element .name-he {
    font-size: 6.5px;
    opacity: 0.85;
    line-height: 1.1;
    direction: rtl;
  }
  .element .mass {
    font-size: 5.5px;
    opacity: 0.6;
    line-height: 1.1;
  }
  .element:hover .number { font-size: 7px; }
  .element:hover .symbol { font-size: 14px; }
  .element:hover .name-he { font-size: 6px; }
  .element:hover .mass { font-size: 5px; }

  .element .state-dot {
    position: absolute;
    top: 3px;
    right: 3px;
    width: 5px; height: 5px;
    border-radius: 50%;
  }
  .state-solid .state-dot { background: #aaa; }
  .state-liquid .state-dot { background: #4fc3f7; }
  .state-gas .state-dot { background: #ff8a80; }
  .state-unknown .state-dot { background: #666; }

  .placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #667;
    min-width: 48px;
    min-height: 48px;
  }
  .spacer { min-width: 48px; min-height: 48px; }

  /* Category Colors */
  .cat-alkali      { background: #6b2fa0; }
  .cat-alkaline    { background: #8b6914; }
  .cat-transition  { background: #2a5298; }
  .cat-post-trans  { background: #2e7d6e; }
  .cat-metalloid   { background: #4a6741; }
  .cat-nonmetal    { background: #1b5e20; }
  .cat-halogen     { background: #00695c; }
  .cat-noble       { background: #4a148c; }
  .cat-lanthanide  { background: #8e4585; }
  .cat-actinide    { background: #a0522d; }
  .cat-unknown     { background: #444; }

  /* Info Panel */
  #info-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(135deg, #16213e, #1a1a2e);
    border-top: 2px solid #4fc3f7;
    padding: 12px 20px;
    display: none;
    z-index: 200;
    direction: rtl;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
  }
  #info-panel.active { display: flex; flex-wrap: wrap; gap: 10px 24px; align-items: flex-start; }
  #info-panel .info-symbol {
    font-size: 48px;
    font-weight: 900;
    line-height: 1;
    min-width: 80px;
    text-align: center;
    padding: 5px 10px;
    border-radius: 8px;
  }
  #info-panel .info-main { flex: 1; min-width: 200px; }
  #info-panel .info-name { font-size: 22px; font-weight: 700; color: #e0e0ff; }
  #info-panel .info-name-en { font-size: 14px; color: #8888bb; }
  #info-panel .info-grid {
    display: flex; flex-wrap: wrap; gap: 4px 18px; margin-top: 6px;
  }
  #info-panel .info-item { font-size: 13px; color: #bbb; }
  #info-panel .info-item span { color: #fff; font-weight: 600; }
  .close-btn {
    position: absolute;
    top: 8px;
    left: 12px;
    background: none;
    border: none;
    color: #888;
    font-size: 20px;
    cursor: pointer;
  }
  .close-btn:hover { color: #fff; }

  /* Badges row */
  #ip-badges {
    display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 4px;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px; border-radius: 20px;
    font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .badge-radioactive { background: rgba(255,80,80,0.2); border: 1px solid #ff5050; color: #ff8080; }
  .badge-synthetic   { background: rgba(80,200,255,0.15); border: 1px solid #4fc3f7; color: #4fc3f7; }
  .badge-magnetic    { background: rgba(180,100,255,0.2); border: 1px solid #b46aff; color: #cc99ff; }
  .badge-noble-gas   { background: rgba(255,200,50,0.15); border: 1px solid #ffc83d; color: #ffc83d; }
  .badge-toxic       { background: rgba(100,220,100,0.15); border: 1px solid #64dc64; color: #90ee90; }
  .badge-precious    { background: rgba(255,215,0,0.2); border: 1px solid #ffd700; color: #ffd700; }
  .badge-biological  { background: rgba(50,200,150,0.2); border: 1px solid #32c896; color: #32c896; }
  .badge-conductor   { background: rgba(255,165,0,0.2); border: 1px solid #ffa500; color: #ffa500; }
  .badge-supercon    { background: rgba(100,200,255,0.2); border: 1px solid #64c8ff; color: #64c8ff; }
  .badge-ancient     { background: rgba(200,180,100,0.2); border: 1px solid #c8b464; color: #c8b464; }

  /* Enriched info section */
  #ip-extra { margin-top: 8px; flex: 1; min-width: 160px; }
  .info-bar-row { margin: 4px 0; }
  .info-bar-label { font-size: 10px; color: #8888bb; margin-bottom: 2px; direction: rtl; }
  .info-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); overflow: hidden; width: 120px; }
  .info-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }

  /* Fun fact */
  #ip-fact { margin-top: 8px; font-size: 12px; color: #aab0cc; font-style: italic; direction: rtl; max-width: 340px; line-height: 1.5; border-right: 3px solid #4fc3f7; padding-right: 8px; }

  /* Element card mini-icons */
  .el-icons { position: absolute; bottom: 2px; left: 0; right: 0; display: flex; justify-content: center; gap: 2px; font-size: 13px; line-height: 1; }
  .el-icon { opacity: 0.95; font-size: 13px; }

  .sep-label {
    grid-column: 1 / span 2;
    display: flex;
    align-items: center;
    font-size: 10px;
    color: #8888bb;
    padding-right: 4px;
    min-height: 48px;
    direction: rtl;
  }
  .sep-row {
    grid-column: 1 / span 18;
    height: 8px;
  }

  @media (max-width: 700px) {
    .periodic-table { gap: 1px; grid-template-columns: repeat(18, minmax(38px, 1fr)); min-width: 700px; }
    .element { min-width: 36px; min-height: 36px; }
    .element .symbol { font-size: 12px; }
    .element .number { font-size: 6px; }
    .element .name-he { font-size: 5px; }
    .element .mass { font-size: 4.5px; }
    #info-panel .info-symbol { font-size: 36px; }
    #info-panel .info-name { font-size: 18px; }
  }
</style>
</head>

// Layout: grid positions [row, col] (1-indexed)
// Standard periodic table layout
const layout = {};

function getGridPos(el) {
  const p = el.period;
  const g = el.group;
  // Lanthanides
  if (el.cat === 'lanthanide') return { row: 9, col: el.z - 57 + 3 };
  // Actinides
  if (el.cat === 'actinide') return { row: 10, col: el.z - 89 + 3 };
  return { row: p, col: g };
}

function catClass(cat) {
  const map = {
    'alkali':'cat-alkali','alkaline':'cat-alkaline','transition':'cat-transition',
    'post-trans':'cat-post-trans','metalloid':'cat-metalloid','nonmetal':'cat-nonmetal',
    'halogen':'cat-halogen','noble':'cat-noble','lanthanide':'cat-lanthanide',
    'actinide':'cat-actinide','unknown':'cat-unknown'
  };
  return map[cat] || 'cat-unknown';
}

function stateClass(state) {
  return 'state-' + (state || 'unknown');
}

const catNames = {
  'alkali':'מתכת אלקלית','alkaline':'מתכת אלקלית-עפרורית','transition':'מתכת מעבר',

function getElIcons(el) {
  let icons = '';
  if (radioactive.has(el.z)) icons += '<span class="el-icon" title="רדיואקטיבי">☢️</span>';
  if (synthetic.has(el.z))   icons += '<span class="el-icon" title="סינתטי">⚗</span>';
  if (magnetic.has(el.z))    icons += '<span class="el-icon" title="מגנטי">🧲</span>';
  if (precious.has(el.z))    icons += '<span class="el-icon" title="מתכת יקרה">✦</span>';
  if (biological.has(el.z))  icons += '<span class="el-icon" title="חיוני לחיים">🧬</span>';
  return icons;
}

function makeBar(label, value, max, color) {
  if (value === null || value === undefined) return '';
  const pct = Math.min(100, Math.max(2, (value / max) * 100));
  return `<div class="info-bar-row">
    <div class="info-bar-label">${label}</div>
    <div class="info-bar"><div class="info-bar-fill" style="width:${pct}%;background:${color};"></div></div>
  </div>`;
}

function showInfo(el) {
  const panel = document.getElementById('info-panel');
  document.getElementById('ip-symbol').textContent = el.sym;
  document.getElementById('ip-symbol').className = 'info-symbol ' + catClass(el.cat);
  document.getElementById('ip-name').textContent = el.he;
  document.getElementById('ip-name-en').textContent = el.en + ' — Z = ' + el.z;

  // --- Badges ---
  let badges = '';
  if (radioactive.has(el.z)) badges += `<span class="badge badge-radioactive">☢️ רדיואקטיבי</span>`;
  if (synthetic.has(el.z))   badges += `<span class="badge badge-synthetic">⚗ סינתטי / מלאכותי</span>`;
  if (magnetic.has(el.z))    badges += `<span class="badge badge-magnetic">🧲 מגנטי</span>`;
  if (precious.has(el.z))    badges += `<span class="badge badge-precious">✦ מתכת יקרה</span>`;
  if (biological.has(el.z))  badges += `<span class="badge badge-biological">🧬 חיוני לחיים</span>`;
  if (toxic.has(el.z))       badges += `<span class="badge badge-toxic">☠ רעיל</span>`;
  if (conductor.has(el.z))   badges += `<span class="badge badge-conductor">⚡ מוליך מצוין</span>`;
  if (el.cat === 'noble')     badges += `<span class="badge badge-noble-gas">✨ גז אציל</span>`;
  if (ancient.has(el.z) && el.yr === -1) badges += `<span class="badge badge-ancient">📜 ידוע מהעת העתיקה</span>`;
  document.getElementById('ip-badges').innerHTML = badges;

  // --- Text info ---
  let items = '';
  const add = (label, val) => { if (val !== null && val !== undefined) items += `<div class="info-item">${label}: <span>${val}</span></div>`; };

  add('מסה אטומית', el.mass + ' u');
  add('קטגוריה', catNames[el.cat]);
  const stateIcons = {solid:'🪨 מוצק', liquid:'💧 נוזל', gas:'💨 גז', unknown:'❓ לא ידוע'};
  add('מצב צבירה (25°C)', stateIcons[el.state] || el.state);
  add('תצורת אלקטרונים', el.econfig);
  add('בלוק', el.block ? el.block.toUpperCase() : null);
  add('מחזור / קבוצה', el.period + ' / ' + (el.group || '—'));
  if (el.eneg) add('אלקטרושליליות (פאולינג)', el.eneg);
  if (el.ox) add('מספרי חמצון', el.ox);
  if (el.mp !== null) add('נקודת היתוך', el.mp + ' °C');
  if (el.bp !== null) add('נקודת רתיחה', el.bp + ' °C');
  if (el.density) add('צפיפות', el.density + ' g/cm³');
  if (el.yr > 0) add('שנת גילוי', el.yr);
  else if (el.yr === -1) add('שנת גילוי', 'ידוע מקדמת דנא');
  if (el.disc && el.yr !== -1) add('מגלה', el.disc);
  document.getElementById('ip-grid').innerHTML = items;

  // --- Visual bars ---
  let extra = '<div style="margin-top:4px;">';
  extra += makeBar('אלקטרושליליות', el.eneg, 4.0, '#a78bfa');
  extra += makeBar('נקודת היתוך', el.mp !== null ? Math.max(0, el.mp) : null, 3700, '#f97316');
  extra += makeBar('צפיפות (g/cm³)', el.density, 22.6, '#22d3ee');
  extra += makeBar('מסה אטומית', el.mass, 294, '#86efac');
  extra += '</div>';
  document.getElementById('ip-extra').innerHTML = extra;

  // --- Fun fact ---
  const fact = elementFacts[el.z];
  document.getElementById('ip-fact').innerHTML = fact ? `💡 ${fact}` : '';
  document.getElementById('ip-fact').style.display = fact ? 'block' : 'none';

  panel.classList.add('active');
}

// Build grid
const grid = document.getElementById('ptable');

// We'll place elements into a 10-row x 18-col grid
// Rows 1-7: main table, row 8: spacer, row 9: lanthanides, row 10: actinides
const cells = {};

elements.forEach(el => {
  const pos = getGridPos(el);
  const key = pos.row + '-' + pos.col;
  cells[key] = el;
});

// Add placeholder for lanthanides/actinides in main table
// Row 6, col 3: "57-71" link
// Row 7, col 3: "89-103" link

for (let r = 1; r <= 10; r++) {
  for (let c = 1; c <= 18; c++) {
    const key = r + '-' + c;
    if (r === 8) {
      if (c === 1) {
        const spacer = document.createElement('div');
        spacer.className = 'sep-row';
        spacer.style.gridColumn = '1 / span 18';
        grid.appendChild(spacer);
      }
      continue;
    }
    
    if (cells[key]) {
      const el = cells[key];
      const div = document.createElement('div');
      div.className = `element ${catClass(el.cat)} ${stateClass(el.state)}`;
      const miniIcons = getElIcons(el);
      div.innerHTML = `
        <span class="number">${el.z}</span>
        <span class="state-dot"></span>
        <span class="symbol">${el.sym}</span>
        <span class="name-he">${el.he}</span>
        <span class="mass">${el.mass}</span>
        ${miniIcons ? `<span class="el-icons">${miniIcons}</span>` : ''}
      `;
      div.style.gridRow = r <= 7 ? r : r;
      div.style.gridColumn = c;
      div.addEventListener('mouseenter', () => showInfo(el));
      div.addEventListener('click', () => showInfo(el));
      grid.appendChild(div);
    } else if (r === 6 && c === 3) {
      // Lanthanide placeholder
      const div = document.createElement('div');
      div.className = 'placeholder';
      div.style.gridRow = 6;
      div.style.gridColumn = 3;
      div.textContent = '57-71';
      div.style.background = 'rgba(142,69,133,0.3)';
      div.style.borderRadius = '5px';
      div.style.fontSize = '9px';
      grid.appendChild(div);
    } else if (r === 7 && c === 3) {
      // Actinide placeholder
      const div = document.createElement('div');
      div.className = 'placeholder';
      div.style.gridRow = 7;
      div.style.gridColumn = 3;
      div.textContent = '89-103';
      div.style.background = 'rgba(160,82,45,0.3)';
      div.style.borderRadius = '5px';
      div.style.fontSize = '9px';
      grid.appendChild(div);
    } else if (r === 9 && c === 1) {
      const div = document.createElement('div');
      div.className = 'sep-label';
      div.style.gridRow = 9;
      div.style.gridColumn = '1 / span 2';
      div.textContent = 'לנתנידים';
      grid.appendChild(div);
    } else if (r === 10 && c === 1) {
      const div = document.createElement('div');
      div.className = 'sep-label';
      div.style.gridRow = 10;
      div.style.gridColumn = '1 / span 2';
      div.textContent = 'אקטינידים';
      grid.appendChild(div);
    }
  }
}
